<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#6366f1">
  <meta name="description" content="StudiaOS - Student Productivity Operating System">
  <title>StudiaOS — Student OS</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="to.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎓</text></svg>">
</head>
<body>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">🎓</div>
      <div class="sidebar-brand">
        <span class="sidebar-title">StudiaOS</span>
        <span class="sidebar-subtitle">Student OS</span>
      </div>
      <button class="sidebar-collapse" id="sidebarCollapse" aria-label="Toggle sidebar">✕</button>
    </div>
    <nav class="sidebar-nav" id="sidebarNav">
      <a class="nav-item active" data-module="dashboard" href="#dashboard">
        <span class="nav-icon">📊</span><span class="nav-label">Dashboard</span>
      </a>
      <a class="nav-item" data-module="planner" href="#planner">
        <span class="nav-icon">📅</span><span class="nav-label">Study Planner</span>
      </a>
      <a class="nav-item" data-module="pomodoro" href="#pomodoro">
        <span class="nav-icon">⏱️</span><span class="nav-label">Pomodoro</span>
      </a>
      <a class="nav-item" data-module="goals" href="#goals">
        <span class="nav-icon">🎯</span><span class="nav-label">Goal Tracker</span>
      </a>
      <a class="nav-item" data-module="habits" href="#habits">
        <span class="nav-icon">✅</span><span class="nav-label">Habit Tracker</span>
      </a>
      <a class="nav-item" data-module="notes" href="#notes">
        <span class="nav-icon">📝</span><span class="nav-label">Notes</span>
      </a>
      <a class="nav-item" data-module="budget" href="#budget">
        <span class="nav-icon">💰</span><span class="nav-label">Budget</span>
      </a>
      <a class="nav-item" data-module="images" href="#images">
        <span class="nav-icon">🖼️</span><span class="nav-label">Images</span>
      </a>
      <a class="nav-item" data-module="voice" href="#voice">
        <span class="nav-icon">🎤</span><span class="nav-label">Voice Notes</span>
      </a>
      <a class="nav-item" data-module="analytics" href="#analytics">
        <span class="nav-icon">📈</span><span class="nav-label">Analytics</span>
      </a>
      <a class="nav-item" data-module="settings" href="#settings">
        <span class="nav-icon">⚙️</span><span class="nav-label">Settings</span>
      </a>
    </nav>
    <div class="sidebar-footer">
      <div class="theme-toggle">
        <button id="themeBtn" class="theme-btn" aria-label="Toggle theme">🌙</button>
      </div>
    </div>
  </aside>

  <main class="main-content" id="mainContent">
    <header class="app-header" id="appHeader">
      <button class="hamburger" id="hamburgerBtn" aria-label="Menu">☰</button>
      <h1 class="page-title" id="pageTitle">Dashboard</h1>
      <div class="header-actions">
        <span class="header-date" id="headerDate"></span>
      </div>
    </header>
    <div class="app-body" id="appBody">
      <div id="appContent" class="app-content"></div>
    </div>
  </main>

  <div id="toastContainer" class="toast-container"></div>

  <div id="modalOverlay" class="modal-overlay hidden">
    <div class="modal" id="modal">
      <div class="modal-header">
        <h2 class="modal-title" id="modalTitle"></h2>
        <button class="modal-close" id="modalClose">✕</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-footer" id="modalFooter"></div>
    </div>
  </div>

  <script src="to.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js').catch(function(){});
    }
  </script>
</body>
</html>
